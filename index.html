<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onco Global Cancer Hospital</title>

  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    header { background:#0a3d62; color:white; padding:15px; text-align:center; }
    nav { background:#1e3799; padding:10px; text-align:center; }
    nav a { color:white; margin:0 15px; text-decoration:none; font-weight:bold; }

    .hero { 
      background:url('https://images.unsplash.com/photo-1586773860418-d37222d8fce3') no-repeat center center/cover; 
      color:white; 
      padding:120px 20px; 
      text-align:center; 
      position:relative;
    }

    .hero::before {
      content:"";
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }

    .hero h2, .hero p {
      position:relative;
      z-index:1;
    }

    .section { padding:30px 40px; }
    .cards { display:flex; gap:20px; flex-wrap:wrap; }

    .card {
      flex:1; min-width:250px;
      border:1px solid #ddd;
      border-radius:10px;
      padding:20px;
      cursor:pointer;
      text-align:center;
      transition:0.3s;
    }

    .card:hover {
      transform:translateY(-5px);
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    footer {
      background:#0a3d62;
      color:white;
      text-align:center;
      padding:20px;
    }

    .service-detail { display:none; padding:40px; }

    /* ✅ WhatsApp Button */
    .whatsapp-float {
      position: fixed;
      bottom: 90px;
      right: 20px;
      z-index: 9999;
      background-color: #25D366;
      border-radius: 50%;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .whatsapp-float img {
      width: 40px;
      height: 40px;
    }
  </style>

  <script>
    function showService(name) {
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('serviceDetail').style.display = 'block';
      document.getElementById('serviceTitle').innerText = name;
      document.getElementById('serviceDesc').innerText =
        name + " treatment at Onco Global Cancer Hospital is handled by expert specialists.";
    }

    function goBack() {
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('serviceDetail').style.display = 'none';
    }
  </script>
</head>

<body>

<header>
  <h1>Onco Global Cancer Hospital</h1>
  <p>Advanced Cancer Care with Compassion</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About Us</a>
  <a href="#">Departments</a>
  <a href="#">Patients</a>
  <a href="#">Contact</a>
</nav>

<div id="mainContent">

<section class="hero">
  <h2>Your Fight Against Cancer Starts Here</h2>
  <p>World-class oncology care</p>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="cards">
    <div class="card" onclick="showService('Blood Cancer')">Blood Cancer</div>
    <div class="card" onclick="showService('Brain Tumor')">Brain Tumor</div>
    <div class="card" onclick="showService('Breast Cancer')">Breast Cancer</div>
  </div>
</section>

</div>

<div id="serviceDetail" class="service-detail">
  <button onclick="goBack()">← Back</button>
  <h2 id="serviceTitle"></h2>
  <p id="serviceDesc"></p>
</div>

<footer>
  <p>© 2026 Onco Global Cancer Hospital</p>
</footer>

</html>
